name: Auto Fix CI Failures

on:
  workflow_run:
    workflows: ["CI - Type Check, Format & Lint"]
    types:
      - completed

permissions:
  contents: write
  pull-requests: write
  actions: read
  issues: write
  id-token: write

jobs:
  auto-fix:
    if: |
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.pull_requests[0]
    runs-on: ubuntu-latest
    steps:
      - name: Log trigger context
        run: |
          echo "=== WORKFLOW_RUN CONTEXT ==="
          echo "Triggered by: ${{ github.event.workflow_run.name }}"
          echo "Conclusion: ${{ github.event.workflow_run.conclusion }}"
          echo "Head branch: ${{ github.event.workflow_run.head_branch }}"
          echo "Head SHA: ${{ github.event.workflow_run.head_sha }}"
          echo "Head repo: ${{ github.event.workflow_run.head_repository.full_name }}"
          echo "Base repo: ${{ github.repository }}"
          echo "PR number: ${{ github.event.workflow_run.pull_requests[0].number }}"
          echo ""
          echo "=== SECURITY CHECK ==="
          echo "Is fork? head_repo != base_repo"
          echo "Head: ${{ github.event.workflow_run.head_repository.full_name }}"
          echo "Base: ${{ github.repository }}"
          echo "NOTE: This workflow has NO fork guard - any fork PR triggers it!"

      - name: Checkout code (VULNERABLE - checks out fork code)
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies (VULNERABLE - runs fork's package.json scripts)
        run: |
          echo "=== ATTACK VECTOR 1: bun install ==="
          echo "Running bun install on attacker-controlled package.json..."
          echo "In a real attack, preinstall/postinstall scripts execute arbitrary code"
          bun install

      - name: Setup git identity
        run: |
          git config --global user.email "claude[bot]@users.noreply.github.com"
          git config --global user.name "claude[bot]"

      - name: Get CI failure details
        id: failure_details
        uses: actions/github-script@v7
        with:
          script: |
            const run = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: ${{ github.event.workflow_run.id }}
            });
            const jobs = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: ${{ github.event.workflow_run.id }}
            });
            const failedJobs = jobs.data.jobs.filter(job => job.conclusion === 'failure');
            return {
              runUrl: run.data.html_url,
              failedJobs: failedJobs.map(j => ({ name: j.name, id: j.id }))
            };

      - name: Fix CI failures with Claude (VULNERABLE - unrestricted shell in fork context)
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            Failed CI Run: ${{ fromJSON(steps.failure_details.outputs.result).runUrl }}
            Failed Jobs: ${{ join(fromJSON(steps.failure_details.outputs.result).failedJobs.*.name, ', ') }}
            PR Number: ${{ github.event.workflow_run.pull_requests[0].number }}
            Branch: ${{ github.event.workflow_run.head_branch }}
            Repository: ${{ github.repository }}

            Fix the CI failures. Common fixes:
            - Biome lint errors: Run `bun run format-lint` or `biome check --fix .`
            - Type errors: Run `bun run check-types` and fix reported issues

            After fixing, commit the changes and push directly to the branch.

          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --max-turns 20
            --allowedTools "Read,Write,Edit,Glob,Grep,Bash(*),WebSearch,WebFetch"
